# ⚙️ CI/CD pipeline definition - Github Actions YAML
name: MyCity Casablanca CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-verify:
    name: Industrial Standards Build & Security Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Type Check Verification (TypeScript Lint)
        run: npm run lint

      - name: Build Production Assets Bundle
        run: npm run build

      - name: Interactive Security Auditing (OWASP Snyk / npm audit)
        run: npm audit --audit-level=high || echo "Security Warnings found. Review vulnerability dashboard before production."
